<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Classification with GoogLeNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background-color: #f5f7ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background-color: #e8eaf6;
            border-color: #764ba2;
        }
        
        #fileInput {
            display: none;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #results {
            margin-top: 30px;
            display: none;
        }
        
        .result-item {
            background: #f5f7ff;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .result-item:first-child {
            border-left-color: #764ba2;
            background: #ede7f6;
        }
        
        .class-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .confidence {
            color: #667eea;
            font-size: 14px;
        }
        
        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-left: 4px solid #c62828;
            border-radius: 4px;
            display: none;
            margin-bottom: 20px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
        .back-home {
            position: static;
            display: inline-block;
            margin-bottom: 20px;
        }
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <a href="/" class="back-home">← Back to Hub</a>

    <div class="container">
        <h1>🖼️ Image Classification</h1>
        
        <div class="error" id="error"></div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-text">Click or drag image here</div>
            <div class="upload-subtext">Supported: PNG, JPG, JPEG, GIF, BMP (Max 16MB)</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <button id="classifyBtn" disabled>Classify Image</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #667eea;">Processing...</p>
        </div>
        
        <div id="results">
            <h2 style="margin-bottom: 15px; color: #333;">Top Predictions:</h2>
            <div id="resultsList"></div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const classifyBtn = document.getElementById('classifyBtn');
        const resultsDiv = document.getElementById('results');
        const resultsList = document.getElementById('resultsList');
        const errorDiv = document.getElementById('error');
        const loading = document.getElementById('loading');
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });
        
        fileInput.addEventListener('change', handleFileSelect);
        
        function handleFileSelect() {
            selectedFile = fileInput.files[0];
            if (selectedFile) {
                uploadArea.innerHTML = `<div class="upload-text">✓ ${selectedFile.name}</div>`;
                classifyBtn.disabled = false;
                resultsDiv.style.display = 'none';
                errorDiv.style.display = 'none';
            }
        }
        
        classifyBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            classifyBtn.disabled = true;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            resultsDiv.style.display = 'none';
            
            try {
                const response = await fetch('api/classify', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Classification failed');
                }
                
                displayResults(data.predictions);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                classifyBtn.disabled = false;
            }
        });
        
        function displayResults(predictions) {
            resultsList.innerHTML = '';
            predictions.forEach((pred, idx) => {
                const confidence = parseFloat(pred.confidence);
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="class-name">${idx + 1}. ${pred.class}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${confidence}%"></div>
                    </div>
                    <div class="confidence">${pred.confidence}</div>
                `;
                resultsList.appendChild(item);
            });
            resultsDiv.style.display = 'block';
        }
    </script>
</body>
</html>
